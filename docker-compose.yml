version: "3.9"

services:

  # ── API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./generated_images:/app/generated_images
      - ./mock_posts:/app/mock_posts
    restart: unless-stopped

  # ── Celery Worker ─────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - mongo
      - redis
    volumes:
      - ./generated_images:/app/generated_images
      - ./mock_posts:/app/mock_posts
    restart: unless-stopped

  # ── Celery Beat (Scheduler) ───────────────────────
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    command: celery -A worker.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file: .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  # ── MongoDB ───────────────────────────────────────
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── MinIO (Storage de imágenes) ───────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"     # Console web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  minio_data:
